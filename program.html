<html>
<head>
<title> Form validation</title>
<script type="text/javascript">
function validate() {
var uname = document.getElementById("user");
if(uname.value ==""){
alert("USER NAME should not be an empty");
uname.focus();
return false;
}
var pass = document.getElementById("pass");
if(pass.value ==""){
alert("PASSWORD should not be an empty");
pass.focus();
return false;
}
var email= document.getElementById("email");
if(email.value ==""){
alert("Email Shouldnot be empty");
email.focus();
return false;
}
if(email.value.indexOf("@",0)<0){
alert("Email Should Contail @ symbol");
email.focus();
return false;
}
if(email.value.indexOf(".",0)<0){
alert("Email Should Contain. symbol");
email.focus();
return false;
}
}
</script>
</head>
<body bgcolor="pink">
<form method="post" action="val1.html" name="contact form">
<h1 align="center">USER REGISTRATION FORM</h1>
<table align="center" border="1">
<tr>
<td>Name:</td>
<td><input type="text" size="20" name="user" id="user"></td>
</tr>
<tr>
<td>Pass:</td>
<td><input type="password" size="8" name="pass" id="pass"></td>
</tr>
<tr>
<td>email:</td>
<td><input type="text" size="20" name="email" id="email"></td>
</tr>
<tr>
<td><input type="submit" value="submit" name="submit" onclick="return validate();"></td>
<td><input type="reset" value="reset" name="reset"></td>
</tr>
</table>
</form>
</body>
</html>
